<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="커플·친구 논쟁을 AI 판사가 공정하게 판정해드립니다!" />
  <title>논쟁 심판 ⚖️</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap"
    rel="stylesheet"
  />

  <!-- 스타일 -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== 헤더 ===== -->
  <header class="site-header">
    <span class="logo-emoji">⚖️</span>
    <h1>논쟁 심판</h1>
    <p>커플·친구 간 논쟁, AI 판사에게 맡겨보세요!</p>
  </header>

  <main class="container">

    <!-- ===== 판정 결과 영역 (결과 나오면 여기에 카드 추가됨) ===== -->
    <div id="resultSection"></div>

    <!-- ===== 입력 폼 ===== -->
    <section class="card form-card" aria-label="논쟁 입력 폼">

      <!-- 관계 유형 -->
      <div class="form-section-title">관계 유형</div>
      <div class="relation-toggle" role="group" aria-label="관계 유형 선택">
        <button class="relation-btn active" data-value="couple" type="button">
          💑 커플
        </button>
        <button class="relation-btn" data-value="friend" type="button">
          👫 친구
        </button>
      </div>

      <!-- 심각도 슬라이더 -->
      <div class="severity-section">
        <div class="form-section-title">심각도</div>
        <div class="severity-labels">
          <span>😂 드립</span>
          <span>🔥 격한</span>
        </div>
        <input
          type="range"
          id="severitySlider"
          min="1"
          max="5"
          value="3"
          aria-label="심각도 슬라이더"
        />
        <div class="severity-value">
          현재: <span id="severityBadgePreview" class="severity-badge-preview">🤔 애매</span>
        </div>
      </div>

      <!-- 상황 설명 -->
      <div class="situation-section">
        <div class="form-section-title">상황</div>
        <textarea
          id="situation"
          class="situation-textarea"
          placeholder="어떤 상황에서 논쟁이 시작됐나요? 배경을 설명해주세요..."
          rows="3"
          maxlength="500"
        ></textarea>
      </div>

      <!-- 캐릭터 프리뷰 -->
      <div class="character-preview-row" id="characterPreviewRow">
        <div class="char-preview" id="charPreviewA">
          <!-- SVG 자동 삽입 -->
          <div class="char-name-label">A</div>
        </div>
        <div class="vs-divider">VS</div>
        <div class="char-preview" id="charPreviewB">
          <!-- SVG 자동 삽입 -->
          <div class="char-name-label">B</div>
        </div>
      </div>

      <!-- A, B 주장 입력 -->
      <div class="arguments-section">
        <!-- A 측 -->
        <div class="argument-group">
          <label class="side-a-label" for="nameA">A 이름</label>
          <input
            type="text"
            id="nameA"
            class="side-a"
            placeholder="예: 민수"
            maxlength="20"
            autocomplete="off"
          />
          <label class="side-a-label" for="argumentA">A 주장</label>
          <textarea
            id="argumentA"
            class="side-a"
            placeholder="A의 주장을 입력하세요..."
            rows="4"
            maxlength="500"
          ></textarea>
        </div>

        <!-- B 측 -->
        <div class="argument-group">
          <label class="side-b-label" for="nameB">B 이름</label>
          <input
            type="text"
            id="nameB"
            class="side-b"
            placeholder="예: 지은"
            maxlength="20"
            autocomplete="off"
          />
          <label class="side-b-label" for="argumentB">B 주장</label>
          <textarea
            id="argumentB"
            class="side-b"
            placeholder="B의 주장을 입력하세요..."
            rows="4"
            maxlength="500"
          ></textarea>
        </div>
      </div>

      <!-- 에러 메시지 -->
      <div id="errorMsg" class="error-msg" role="alert"></div>

      <!-- 제출 버튼 -->
      <button id="submitBtn" class="submit-btn" type="button">
        <span>⚖️</span>
        <span>심판 요청!</span>
      </button>

    </section>

    <!-- ===== 역대 판정 피드 ===== -->
    <section class="feed-section" aria-label="역대 판정 피드">
      <h2 class="feed-title">🏛️ 역대 판정</h2>
      <p class="feed-sub">하트 순으로 정렬된 역대 논쟁 판정 기록</p>
      <!-- 관계 유형 탭 -->
      <div class="relation-tab-bar">
        <button class="relation-tab active" data-relation="전체">전체</button>
        <button class="relation-tab" data-relation="couple">💑 커플</button>
        <button class="relation-tab" data-relation="friend">👫 친구</button>
      </div>
      <!-- 태그 필터 -->
      <div id="tagFilterBar" class="tag-filter-bar"></div>
      <div id="feedList"></div>
    </section>

  </main>

  <!-- ===== 로딩 오버레이 ===== -->
  <div id="loadingOverlay" class="loading-overlay" role="status" aria-live="polite">
    <div class="loading-spinner"></div>
    <div class="loading-text">⚖️ 판사가 심사 중...</div>
    <div class="loading-sub">AI 판사가 두 분의 주장을 꼼꼼히 검토하고 있어요.</div>
  </div>

  <!-- ===== 토스트 알림 ===== -->
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <!-- html2canvas -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <script src="app.js"></script>

</body>
</html>
